lint:vet:
  stage: lint
  script:
    - go vet ./...
  tags:
    - k8s-tbk

lint:modtidy:
  stage: lint
  script:
    - ci/tidy.sh
  tags:
    - k8s-tbk

test:go:
  stage: test
  script:
    - go test ./...
  tags:
    - k8s-tbk

validate:tag-message:
  stage: validate
  only:
    - tags
  script:
    - ci/validate_tag_message.sh $CI_COMMIT_TAG
  tags:
    - k8s-tbk

deploy:deploy-to-github:
  stage: deploy
  only:
    - tags
  script:
    - ci/deploy_to_github.sh
  tags:
    - k8s-tbk

release:release-to-github:
  stage: release
  only:
    - tags
  script:
    - ci/release_to_github.sh $CI_COMMIT_TAG
  tags:
    - k8s-tbk
