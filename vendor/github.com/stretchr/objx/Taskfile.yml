version: '3'

tasks:
  default:
    deps: [test]

  lint:
    desc: Checks code style
    cmds:
      - gofmt -d -s *.go
      - go vet ./...
    silent: true

  lint-fix:
    desc: Fixes code style
    cmds:
      - gofmt -w -s *.go

  test:
    desc: Runs go tests
    cmds:
      - go test -race  ./...

  test-coverage:
