# kubectl apply -f docs/snippets/tutorials/rfc2136/fixtures.yaml
# kubectl delete -f docs/snippets/tutorials/rfc2136/fixtures.yaml
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: test-a-records
  namespace: default
spec:
  endpoints:
  - dnsName: app.example.local
    recordTTL: 300
    recordType: A
    targets:
    - 192.168.49.10
  - dnsName: api.example.local
    recordTTL: 300
    recordType: A
    targets:
    - 192.168.49.20
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-rfc2136
  namespace: default
  labels:
    svc: test-svc
  annotations:
    external-dns.alpha.kubernetes.io/hostname: svc.example.local
spec:
  type: LoadBalancer
  ports:
  - port: 80
    name: http
    targetPort: 80
  selector:
    app: nginx
