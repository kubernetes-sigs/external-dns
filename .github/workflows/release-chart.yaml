name: Release Chart

on:
  push:
    branches:
      - master
    paths:
      - "charts/external-dns/Chart.yaml"

concurrency:
  group: chart-release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release
    if: github.repository == 'kubernetes-sigs/external-dns'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install YQ
        uses: action-stars/install-tool-from-github-release@1fa61c3bea52eca3bcdb1f5c961a3b113fe7fa54 # v0.2.6
        with:
          github_token: ${{ github.token }}
          owner: mikefarah
          repository: yq
          extract: false
          filename_format: "{name}_{os}_{arch}"
          check_command: yq --version
          version: latest

      - name: Install MDQ
        uses: action-stars/install-tool-from-github-release@1fa61c3bea52eca3bcdb1f5c961a3b113fe7fa54 # v0.2.6
        with:
          github_token: ${{ github.token }}
          owner: yshavit
          repository: mdq
          arch_amd64: x64
          filename_format: "{name}-{os}-{arch}.{ext}"
          check_command: mdq --version
          version: latest

      - name: Get chart version
        id: chart_version
        run: |
          set -euo pipefail
          chart_version="$(grep -Po "(?<=^version: ).+" charts/external-dns/Chart.yaml)"
          echo "version=${chart_version}" >> $GITHUB_OUTPUT

      - name: Get changelog entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@32aa5b4c155d76c94e4ec883a223c947b2f02656 # v2.2.3
        with:
          path: charts/external-dns/CHANGELOG.md
          version: "v${{ steps.chart_version.outputs.version }}"

      - name: Process changelog
        id: changelog
        run: |
          set -euo pipefail

          package_dir="./.cr-release-packages"
          mkdir -p "${package_dir}"

          release_notes_file="RELEASE.md"
          release_notes_path="./charts/external-dns/${release_notes_file}"

          cat <<"EOF" > "${release_notes_path}"
          ${{ steps.changelog_reader.outputs.changes }}
          EOF

          added="$(mdq --output plain '# Added | -' <"${release_notes_path}" || true)"
          changed="$(mdq --output plain '# Changed | -' <"${release_notes_path}" || true)"
          deprecated="$(mdq --output plain '# Deprecated | -' <"${release_notes_path}" || true)"
          removed="$(mdq --output plain '# Removed | -' <"${release_notes_path}" || true)"
          fixed="$(mdq --output plain '# Fixed | -' <"${release_notes_path}" || true)"
          security="$(mdq --output plain '# Security | -' <"${release_notes_path}" || true)"

          changes_path="./charts/external-dns/changes.txt"
          rm -f "${changes_path}"

          old_ifs="${IFS}"
          IFS=$'\n'

          for item in ${added}; do
            printf -- '- kind: added\n  description: "%s"\n' "${item%.*}." >> "${changes_path}"
          done

          for item in ${changed}; do
            printf -- '- kind: changed\n  description: "%s"\n' "${item%.*}." >> "${changes_path}"
          done

          for item in ${deprecated}; do
            printf -- '- kind: deprecated\n  description: "%s"\n' "${item%.*}." >> "${changes_path}"
          done

          for item in ${removed}; do
            printf -- '- kind: removed\n  description: "%s"\n' "${item%.*}." >> "${changes_path}"
          done

          for item in ${fixed}; do
            printf -- '- kind: fixed\n  description: "%s"\n' "${item%.*}." >> "${changes_path}"
          done

          for item in ${security}; do
            printf -- '- kind: security\n  description: "%s"\n' "${item%.*}." >> "${changes_path}"
          done

          IFS="${old_ifs}"

          if [[ -f "${changes_path}" ]]; then
            changes="$(cat "${changes_path}")" yq eval --inplace '.annotations["artifacthub.io/changes"] |= strenv(changes)' ./charts/external-dns/Chart.yaml
            rm -f "${changes_path}"
          fi

          echo "release_notes_file=${release_notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Install Artifact Hub CLI
        uses: action-stars/install-tool-from-github-release@1fa61c3bea52eca3bcdb1f5c961a3b113fe7fa54 # v0.2.6
        with:
          github_token: ${{ github.token }}
          owner: artifacthub
          repository: hub
          name: ah
          check_command: ah version
          version: latest

      - name: Run Artifact Hub lint
        run: ah lint --kind helm --path ./charts/external-dns || exit 1

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: latest

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          install_only: true
        env:
          CR_TOKEN: "${{ github.token }}"

      - name: Package chart
        run: |
          set -euo pipefail

          rm -rf .cr-release-packages .cr-index
          mkdir -p .cr-release-packages .cr-index

          cr package charts/external-dns --package-path .cr-release-packages

      - name: Publish chart release
        env:
          GH_TOKEN: "${{ github.token }}"
          RELEASE_NOTES_FILE: "${{ steps.changelog.outputs.release_notes_file }}"
          VERSION: "${{ steps.chart_version.outputs.version }}"
        run: |
          set -euo pipefail

          release_tag="external-dns-helm-chart-${VERSION}"
          release_title="${release_tag}"
          release_notes_path="charts/external-dns/${RELEASE_NOTES_FILE}"
          chart_asset=".cr-release-packages/external-dns-${VERSION}.tgz"
          asset_name="$(basename "${chart_asset}")"

          retry() {
            local attempts="$1"
            shift
            local delay=5
            local attempt
            for attempt in $(seq 1 "${attempts}"); do
              if "$@"; then
                return 0
              fi
              if [[ "${attempt}" == "${attempts}" ]]; then
                return 1
              fi
              sleep "${delay}"
              delay=$((delay * 2))
            done
          }

          get_release() {
            gh release view "${release_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json databaseId,isDraft,tagName \
              --jq '{id: .databaseId, draft: .isDraft, tag_name: .tagName}'
          }

          create_draft_release() {
            local notes
            notes="$(<"${release_notes_path}")"
            gh api -X POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="${release_tag}" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="${release_title}" \
              -f body="${notes}" \
              -F draft=true \
              -f make_latest=false
          }

          ensure_release_exists() {
            if get_release >release.json 2>/dev/null; then
              return 0
            fi

            create_draft_release >release.json
          }

          retry 5 ensure_release_exists

          release_id="$(jq -r '.id' release.json)"
          is_draft="$(jq -r '.draft' release.json)"

          get_asset() {
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" \
              --jq ".[] | select(.name == \"${asset_name}\")" | jq -s '.[0] // empty'
          }

          asset_exists() {
            local asset
            asset="$(get_asset)"
            [[ -n "${asset}" ]] && jq -e '.state == "uploaded" and .size > 0' <<<"${asset}" >/dev/null
          }

          delete_incomplete_asset_if_present() {
            local asset
            asset="$(get_asset)"
            if [[ -z "${asset}" ]] || jq -e '.state == "uploaded" and .size > 0' <<<"${asset}" >/dev/null; then
              return 0
            fi

            local asset_id
            asset_id="$(jq -r '.id' <<<"${asset}")"
            echo "Deleting incomplete asset ${asset_name} from draft release ${release_tag}."
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
          }

          upload_asset_if_missing() {
            if asset_exists; then
              echo "Asset ${asset_name} is already attached to draft release ${release_tag}."
              return 0
            fi

            delete_incomplete_asset_if_present
            gh release upload "${release_tag}" "${chart_asset}"
          }

          publish_release_if_draft() {
            local is_draft
            is_draft="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" --jq '.draft')"
            if [[ "${is_draft}" == "false" ]]; then
              echo "Release ${release_tag} is already published."
              return 0
            fi

            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F draft=false \
              -f make_latest=false >/dev/null
          }

          if [[ "${is_draft}" == "true" ]]; then
            retry 5 upload_asset_if_missing
            retry 5 publish_release_if_draft
          elif retry 5 asset_exists; then
            echo "Release ${release_tag} is already published with ${asset_name}; continuing to index update."
          else
            echo "Release ${release_tag} is already published without ${asset_name}; refusing to modify an immutable release." >&2
            exit 1
          fi

      - name: Update chart index
        env:
          CR_TOKEN: "${{ github.token }}"
        run: |
          set -euo pipefail

          retry() {
            local attempts="$1"
            shift
            local delay=5
            local attempt
            for attempt in $(seq 1 "${attempts}"); do
              if "$@"; then
                return 0
              fi
              if [[ "${attempt}" == "${attempts}" ]]; then
                return 1
              fi
              sleep "${delay}"
              delay=$((delay * 2))
            done
          }

          retry 5 cr index \
            --owner kubernetes-sigs \
            --git-repo external-dns \
            --package-path .cr-release-packages \
            --release-name-template "external-dns-helm-chart-{{ .Version }}" \
            --push
