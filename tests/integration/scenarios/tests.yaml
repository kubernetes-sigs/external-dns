# Integration Test Scenarios
#
# Schema Summary:
# | Field                                  | Type     | Description                              |
# |----------------------------------------|----------|------------------------------------------|
# | name                                   | string   | Test scenario name                       |
# | config.sources                         | []string | Sources to create: ingress, service      |
# | config.defaultTargets                  | []string | --default-targets flag values            |
# | config.forceDefaultTargets             | bool     | --force-default-targets flag             |
# | config.targetNetFilter                 | []string | --target-net-filter flag values          |
# | config.serviceTypeFilter               | []string | --service-type-filter flag values        |
# | resources                              | []object | K8s resources with optional dependencies |
# | resources[].resource                   | object   | K8s resource (Ingress, Service, etc.)    |
# | resources[].dependencies               | object   | Auto-generated dependent resources       |
# | resources[].dependencies.pods.replicas | int      | Number of pods to generate               |
# | expected                               | []object | Expected endpoints                       |

# TODO:
# 1. Support to Endpoint.ResourceLabelKey
# 2. Support for Endpoint.RefObject
# 3. Support for Endpoint.ProviderSpecific

scenarios:
  - name: headless-service-with-pods
    description: >
      Test that a headless Service with associated Pods
      creates the correct DNS A records for each Pod IP.
    config:
      sources: ["service"]
      targetNetFilter: ["10.0.0.1/32", "10.0.0.2/32"]
      serviceTypeFilter: ["ClusterIP"]
    resources:
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: headless-svc
            namespace: default
            labels:
              app: myapp
            annotations:
              external-dns.alpha.kubernetes.io/hostname: headless.example.com
          spec:
            type: ClusterIP
            clusterIP: None
            selector:
              app: myapp
        dependencies:
          pods:
            replicas: 3
    expected:
      - dnsName: headless.example.com
        targets: ["10.0.0.1", "10.0.0.2"]
        recordType: A
      - dnsName: headless-svc-0.headless.example.com
        targets: ["10.0.0.1"]
        recordType: A
      - dnsName: headless-svc-1.headless.example.com
        targets: ["10.0.0.2"]
        recordType: A

  - name: service-loadbalancer-with-ip
    description: >
      Test that a Service of type LoadBalancer with an assigned IP
      creates the correct DNS A record.
    config:
      sources: ["service"]
    resources:
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: test-service
            namespace: default
            annotations:
              external-dns.alpha.kubernetes.io/hostname: svc.example.com
          spec:
            selector:
              app.kubernetes.io/name: MyApp
            type: LoadBalancer
          status:
            loadBalancer:
              ingress:
                - ip: 1.2.3.4
    expected:
      - dnsName: svc.example.com
        targets: ["1.2.3.4"]
        recordType: A

  - name: known-limitation-cross-source-dedup-not-applied
    description: >
      Documents a known limitation: when multiple ingresses share the same hostname,
      ingressSource.Endpoints() merges their targets via MergeEndpoints() before the
      dedupSource ever sees them. The resulting combined ingress endpoint
      (["1.2.3.4","203.0.113.10"]) has different Targets.String() than the service
      endpoint (["1.2.3.4"]), so the dedupSource keeps both — producing two A records
      for the same hostname. Ideally the service endpoint would be absorbed into the
      ingress one, but that would require cross-source target merging which does not
      exist today. See the "service-and-ingress-same-hostname-and-ip-dedup" scenario
      for a case where deduplication does work correctly.
    config:
      sources: ["service", "ingress"]
    resources:
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: test-service
            namespace: default
            annotations:
              external-dns.alpha.kubernetes.io/hostname: example.local
          spec:
            selector:
              app.kubernetes.io/name: MyApp
            type: LoadBalancer
          status:
            loadBalancer:
              ingress:
                - ip: 1.2.3.4
      - resource:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: test-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: "nginx"
          spec:
            rules:
              - host: example.local
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: my-service
                          port:
                            number: 80
          status:
            loadBalancer:
              ingress:
                - ip: 203.0.113.10
      - resource:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-with-same-host-and-status-as-service
            namespace: kube-system
            annotations:
              kubernetes.io/ingress.class: "nginx"
          spec:
            rules:
              - host: example.local
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: my-service
                          port:
                            number: 80
          status:
            loadBalancer:
              ingress:
                - ip: 1.2.3.4
    expected:
      # The ingress source merges all ingresses with the same hostname via MergeEndpoints(),
      # so both ingresses (203.0.113.10 and 1.2.3.4) produce one combined endpoint.
      - dnsName: example.local
        targets: ["1.2.3.4", "203.0.113.10"]
        recordType: A
      # The service source produces a separate endpoint for the same hostname.
      - dnsName: example.local
        targets: ["1.2.3.4"]
        recordType: A

  - name: service-and-ingress-same-hostname-and-ip-dedup
    description: >
      Test that dedupSource correctly removes an exact duplicate endpoint.
      Both the Service and the Ingress resolve example.local to the same IP
      (1.2.3.4), so each source emits an identical endpoint
      (RecordType=A, DNSName=example.local, Targets=["1.2.3.4"]).
      The dedupSource key is RecordType+DNSName+SetIdentifier+Targets.String(),
      which matches, so the second endpoint is dropped and only one A record survives.
    config:
      sources: ["service", "ingress"]
    resources:
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: test-service
            namespace: default
            annotations:
              external-dns.alpha.kubernetes.io/hostname: example.local
          spec:
            selector:
              app.kubernetes.io/name: MyApp
            type: LoadBalancer
          status:
            loadBalancer:
              ingress:
                - ip: 1.2.3.4
      - resource:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: test-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: "nginx"
          spec:
            rules:
              - host: example.local
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: my-service
                          port:
                            number: 80
          status:
            loadBalancer:
              ingress:
                - ip: 1.2.3.4
    expected:
      - dnsName: example.local
        targets: ["1.2.3.4"]
        recordType: A

  - name: cname-dedup-across-sources
    description: Deduplicates identical CNAMEs when multiple sources produce the same hostname target
    config:
      sources: ["service", "ingress"]
    resources:
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: test-service
            namespace: default
            annotations:
              external-dns.alpha.kubernetes.io/hostname: example.local
          spec:
            selector:
              app.kubernetes.io/name: MyApp
            type: LoadBalancer
          status:
            loadBalancer:
              ingress:
                - hostname: elb.example.com
      - resource:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: test-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: "nginx"
          spec:
            rules:
              - host: example.local
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: test-service
                          port:
                            number: 80
          status:
            loadBalancer:
              ingress:
                - hostname: elb.example.com
    expected:
      - dnsName: example.local
        targets: ["elb.example.com"]
        recordType: CNAME

  - name: cname-conflict-across-sources
    description: >
      When a Service and an Ingress map the same hostname to different CNAME targets,
      dedupSource keeps both (targets differ, so no dedup match).
      Conflict resolution is left to the provider.
    config:
      sources: ["service", "ingress"]
    resources:
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: test-service
            namespace: default
            annotations:
              external-dns.alpha.kubernetes.io/hostname: example.local
          spec:
            selector:
              app.kubernetes.io/name: MyApp
            type: LoadBalancer
          status:
            loadBalancer:
              ingress:
                - hostname: a.elb.example.com
      - resource:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: test-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: "nginx"
          spec:
            rules:
              - host: example.local
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: test-service
                          port:
                            number: 80
          status:
            loadBalancer:
              ingress:
                - hostname: b.elb.example.com
    expected:
      - dnsName: example.local
        targets: ["a.elb.example.com"]
        recordType: CNAME
      - dnsName: example.local
        targets: ["b.elb.example.com"]
        recordType: CNAME

# CRD
  - name: crd-a-record
    description: >
      A DNSEndpoint with an A record creates the correct DNS entry.
    config:
      sources: ["crd"]
    resources:
      - resource:
          apiVersion: externaldns.k8s.io/v1alpha1
          kind: DNSEndpoint
          metadata:
            name: my-dns
            namespace: default
          spec:
            endpoints:
              - dnsName: www.example.com
                targets:
                  - 1.2.3.4
                recordType: A
                recordTTL: 300
    expected:
      - dnsName: www.example.com
        targets: ["1.2.3.4"]
        recordType: A
        recordTTL: 300

  - name: crd-cname-record
    description: >
      A DNSEndpoint with a CNAME record creates the correct DNS entry.
    config:
      sources: ["crd"]
    resources:
      - resource:
          apiVersion: externaldns.k8s.io/v1alpha1
          kind: DNSEndpoint
          metadata:
            name: my-cname
            namespace: default
          spec:
            endpoints:
              - dnsName: alias.example.com
                targets:
                  - target.example.com
                recordType: CNAME
                recordTTL: 180
    expected:
      - dnsName: alias.example.com
        targets: ["target.example.com"]
        recordType: CNAME
        recordTTL: 180

  - name: crd-multiple-endpoints
    description: >
      A DNSEndpoint with multiple spec.endpoints entries produces one DNS record
      per entry. MergeEndpoints combines entries sharing the same dnsName and
      recordType into a single multi-target record.
    config:
      sources: ["crd"]
    resources:
      - resource:
          apiVersion: externaldns.k8s.io/v1alpha1
          kind: DNSEndpoint
          metadata:
            name: multi-dns
            namespace: default
          spec:
            endpoints:
              - dnsName: multi.example.com
                targets:
                  - 1.2.3.4
                  - 5.6.7.8
                recordType: A
                recordTTL: 60
              - dnsName: alias.example.com
                targets:
                  - multi.example.com
                recordType: CNAME
                recordTTL: 60
    expected:
      - dnsName: multi.example.com
        targets: ["1.2.3.4", "5.6.7.8"]
        recordType: A
        recordTTL: 60
      - dnsName: alias.example.com
        targets: ["multi.example.com"]
        recordType: CNAME
        recordTTL: 60

  - name: crd-and-service
    description: >
      When both the crd and service sources are active, endpoints from each
      source are combined. The crd source contributes an A record for
      api.example.com and the service source contributes an A record for
      svc.example.com.
    config:
      sources: ["crd", "service"]
    resources:
      - resource:
          apiVersion: externaldns.k8s.io/v1alpha1
          kind: DNSEndpoint
          metadata:
            name: api-dns
            namespace: default
          spec:
            endpoints:
              - dnsName: api.example.com
                targets:
                  - 10.0.0.1
                recordType: A
                recordTTL: 120
      - resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: my-svc
            namespace: default
            annotations:
              external-dns.alpha.kubernetes.io/hostname: svc.example.com
          spec:
            type: LoadBalancer
          status:
            loadBalancer:
              ingress:
                - ip: 10.0.0.2
    expected:
      - dnsName: api.example.com
        targets: ["10.0.0.1"]
        recordType: A
        recordTTL: 120
      - dnsName: svc.example.com
        targets: ["10.0.0.2"]
        recordType: A
